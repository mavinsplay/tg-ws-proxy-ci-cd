name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Версия сборки"
        required: true
        type: string

jobs:
  build-windows:
    name: Build Windows x64 EXE
    runs-on: windows-latest

    steps:
      - name: Clone upstream tg-ws-proxy
        run: |
          git clone https://github.com/Flowseal/tg-ws-proxy.git src

      - name: Set up Python 3.12 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install dependencies
        shell: pwsh
        working-directory: src
        run: |
          python -m pip install --upgrade pip
          pip install `
            cryptography `
            customtkinter `
            pystray `
            Pillow `
            pyinstaller

      - name: Build EXE with upstream windows.spec
        shell: pwsh
        working-directory: src
        run: |
          pyinstaller packaging/windows.spec --noconfirm --clean

      - name: Rename EXE to include platform suffix
        shell: pwsh
        working-directory: src
        run: |
          Rename-Item -Path "dist\TgWsProxy.exe" -NewName "TgWsProxy_windows.exe"

      - name: Verify build output
        shell: pwsh
        working-directory: src
        run: |
          if (-Not (Test-Path "dist\TgWsProxy_windows.exe")) {
            Write-Error "EXE не найден — сборка провалилась"
            exit 1
          }
          $size = (Get-Item "dist\TgWsProxy_windows.exe").Length / 1MB
          Write-Host ("Сборка успешна: {0:N1} МБ" -f $size)

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-windows-x64
          path: src/dist/TgWsProxy_windows.exe
          retention-days: 7

  release:
    name: Create Draft Release
    needs: build-windows
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-windows-x64
          path: dist/

      - name: Fetch upstream release notes by tag
        id: upstream
        run: |
          VERSION="v${{ github.event.inputs.version }}"
          echo "Fetching release notes for tag ${VERSION}..."

          RESPONSE=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/Flowseal/tg-ws-proxy/releases/tags/${VERSION}")

          if [ $? -ne 0 ]; then
            echo "body=Сборка выполнена вручную. Релиз upstream не найден для тега ${VERSION}." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Извлекаем body релиза и сохраняем в файл (многострочный output)
          echo "$RESPONSE" | jq -r '.body // "Описание отсутствует."' > upstream_body.md
          echo "Upstream release notes получены успешно"

      - name: Build release body
        run: |
          VERSION="v${{ github.event.inputs.version }}"

          cat <<EOF > release_body.md
          $(cat upstream_body.md)

          ---

          ### Установка (Windows)

          Скачайте \`TgWsProxy_windows.exe\` и запустите.
          При первом запуске откроется окно с инструкцией по подключению Telegram Desktop.

          > Сборка выполнена автоматически через GitHub Actions из [открытого исходного кода](https://github.com/Flowseal/tg-ws-proxy).
          EOF

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "TG WS Proxy v${{ github.event.inputs.version }}"
          body_path: release_body.md
          draft: true
          prerelease: false
          files: dist/TgWsProxy_windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}