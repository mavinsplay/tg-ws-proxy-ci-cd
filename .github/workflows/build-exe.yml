name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Версия сборки (например: 1.2.1)"
        required: true
        type: string
      changelog:
        description: "Описание изменений для релиза (каждый пункт с новой строки)"
        required: false
        default: "Сборка выполнена вручную."

jobs:
  build-windows:
    name: Build Windows x64 EXE
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Download tg_ws_proxy.py from upstream
        shell: pwsh
        run: |
          $url = "https://raw.githubusercontent.com/Flowseal/tg-ws-proxy/main/proxy/tg_ws_proxy.py"
          Invoke-WebRequest -Uri $url -OutFile tg_ws_proxy.py

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Установка зависимостей скрипта
          pip install cryptography
          # Установка PyInstaller для сборки EXE
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --name "TgWsProxy_windows" `
            --target-arch x86_64 `
            --clean `
            tg_ws_proxy.py

      - name: Verify build output
        shell: pwsh
        run: |
          if (-Not (Test-Path "dist\TgWsProxy_windows.exe")) {
            Write-Error "EXE не найден — сборка провалилась"
            exit 1
          }
          Write-Host "Сборка успешна: $(Get-Item dist\TgWsProxy_windows.exe | Select-Object -ExpandProperty Length) байт"

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-windows-x64
          path: dist/TgWsProxy_windows.exe
          retention-days: 7

  release:
    name: Create Draft Release
    needs: build-windows
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-windows-x64
          path: dist/

      - name: Format release body
        id: body
        run: |
          VERSION="v${{ github.event.inputs.version }}"
          CHANGELOG="${{ github.event.inputs.changelog }}"

          # Превращаем строки changelog в markdown-список
          FORMATTED=$(echo "$CHANGELOG" | sed 's/^/- /')

          cat <<EOF > release_body.md
          ## TG WS Proxy ${VERSION}

          ${FORMATTED}

          ---

          ### Установка (Windows)

          Скачайте \`TgWsProxy_windows.exe\` и запустите.  
          При первом запуске откроется окно с инструкцией по подключению Telegram Desktop.

          > Сборка выполнена автоматически через GitHub Actions из исходного кода.
          EOF

          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "TG WS Proxy v${{ github.event.inputs.version }}"
          body_path: release_body.md
          draft: true
          prerelease: false
          files: dist/TgWsProxy_windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
