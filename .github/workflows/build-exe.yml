name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Версия сборки (например: 1.6.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64 EXE
    runs-on: windows-latest

    steps:
      - name: Clone upstream tg-ws-proxy
        run: git clone https://github.com/Flowseal/tg-ws-proxy.git src

      - name: Set up Python 3.12 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"

      # Точно как у Flowseal — нужен MSVC 14.40 для сборки cryptography
      - name: Setup MSVC 14.40 toolset
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.40

      # pip install . — ставит все зависимости из pyproject.toml/setup.cfg репо
      - name: Install dependencies
        working-directory: src
        run: pip install .

      # Собираем PyInstaller из исходников (как у Flowseal) — убирает детект антивирусами
      - name: Build PyInstaller bootloader from source
        working-directory: src
        run: pip install "pyinstaller==6.16.0" --no-binary pyinstaller
        env:
          PYINSTALLER_COMPILE_BOOTLOADER: 1

      - name: Build EXE with PyInstaller
        working-directory: src
        run: pyinstaller packaging/windows.spec --noconfirm

      # Стираем Rich PE header — снижает срабатывания антивирусов
      - name: Strip Rich PE header
        working-directory: src
        shell: bash
        run: |
          python -c "
          import struct, pathlib
          exe = pathlib.Path('dist/TgWsProxy.exe')
          data = bytearray(exe.read_bytes())
          rich = data.find(b'Rich')
          if rich == -1:
              raise SystemExit('Rich header not found')
          ck = struct.unpack_from('<I', data, rich + 4)[0]
          dans = struct.pack('<I', 0x536E6144 ^ ck)
          ds = data.find(dans)
          if ds == -1:
              raise SystemExit('DanS marker not found')
          data[ds:rich + 8] = b'\x00' * (rich + 8 - ds)
          exe.write_bytes(data)
          print(f'Stripped Rich header: offset {ds}..{rich+8}')
          "

      - name: Rename artifact
        working-directory: src
        shell: bash
        run: mv dist/TgWsProxy.exe dist/TgWsProxy_windows.exe

      - name: Verify build output
        working-directory: src
        shell: pwsh
        run: |
          if (-Not (Test-Path "dist\TgWsProxy_windows.exe")) {
            Write-Error "EXE не найден — сборка провалилась"
            exit 1
          }
          $size = (Get-Item "dist\TgWsProxy_windows.exe").Length / 1MB
          Write-Host ("Сборка успешна: {0:N1} МБ" -f $size)

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-windows-x64
          path: src/dist/TgWsProxy_windows.exe
          retention-days: 7

  release:
    name: Create Draft Release
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-windows-x64
          path: dist/

      - name: Fetch upstream release notes by tag
        run: |
          VERSION="v${{ github.event.inputs.version }}"
          echo "Fetching release notes for tag ${VERSION}..."

          RESPONSE=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/Flowseal/tg-ws-proxy/releases/tags/${VERSION}")

          if [ $? -ne 0 ]; then
            echo "Upstream release not found for tag ${VERSION}, using fallback."
            echo "Сборка выполнена вручную. Релиз upstream не найден для тега ${VERSION}." > upstream_body.md
          else
            echo "$RESPONSE" | jq -r '.body // "Описание отсутствует."' > upstream_body.md
            echo "Release notes fetched successfully."
          fi

      - name: Build release body
        run: |
          cat <<'FOOTER' >> upstream_body.md

          ---

          ### Установка (Windows)

          Скачайте `TgWsProxy_windows.exe` и запустите.
          При первом запуске откроется окно с инструкцией по подключению Telegram Desktop.

          > Сборка выполнена автоматически через GitHub Actions из [открытого исходного кода](https://github.com/Flowseal/tg-ws-proxy).
          FOOTER

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "TG WS Proxy v${{ github.event.inputs.version }}"
          body_path: upstream_body.md
          draft: true
          prerelease: false
          files: dist/TgWsProxy_windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
